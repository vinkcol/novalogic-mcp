name: novalogic-environment

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: novalogic-mcp-db
    environment:
      POSTGRES_DB: novalogic_mcp
      POSTGRES_USER: novalogic
      POSTGRES_PASSWORD: novalogic_mcp_2024
    ports:
      - "5433:5432"
    volumes:
      - novalogic_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novalogic -d novalogic_mcp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: novalogic-mcp-redis
    ports:
      - "6380:6379"
    volumes:
      - novalogic_redis:/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: novalogic-mcp-mongo
    environment:
      MONGO_INITDB_DATABASE: novalogic_knowledge
    ports:
      - "27018:27017"
    volumes:
      - novalogic_mongo:/data/db
    restart: unless-stopped

volumes:
  novalogic_pgdata:
  novalogic_redis:
  novalogic_mongo:
